<!DOCTYPE html>
<html>
<head>
    <title>Para Ti 🌹</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        canvas { max-width: 90vmin; max-height: 90vmin; }
        .msg { color: #ff4d4d; font-family: 'Arial', sans-serif; font-size: 24px; text-shadow: 0 0 10px #f00; margin-top: 20px; text-align: center; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div class="msg">🌹 Feliz 20 de Abril 🌹<br>Mis 20 rosas para ti</div>
    <script>
        var canvas = document.getElementById("c");
        var context = canvas.getContext("2d");
        var a = context;
        var b = document.body;
        var c = canvas;
        c.width = 600;
        c.height = 600;

        function f(x, y, z) {
            var a = x * x + y * y + z * z - 1;
            return a * a * a - x * x * z * z * z - y * y * z * z * z;
        }

        function h(a, b) {
            return Math.pow(Math.pow(a, 2) + Math.pow(b, 2), .5) - .01;
        }

        var L = 30;
        setInterval(function () {
            for (var i = 0; i < 10000; i++) {
                var x = Math.random() * 2 - 1;
                var y = Math.random() * 2 - 1;
                var z = Math.random() * 2 - 1;
                if (f(x, y, z) < 0) {
                    var u = x, v = y, w = z;
                    var x2 = u, y2 = v, z2 = w;
                    var r = Math.sqrt(x2 * x2 + y2 * y2 + z2 * z2);
                    var θ = Math.atan2(y2, x2);
                    var φ = Math.acos(z2 / r);
                    var s = 1.5;
                    var x3 = s * r * Math.sin(φ) * Math.cos(θ);
                    var y3 = s * r * Math.sin(φ) * Math.sin(θ);
                    var z3 = s * r * Math.cos(φ);
                    var px = x3 * 200 + 300;
                    var py = -z3 * 200 + 300;
                    a.fillStyle = "rgba(255,0,0,0.1)";
                    a.fillRect(px, py, 1, 1);
                }
            }
        }, 50);
    </script>
</body>
</html>
