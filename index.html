<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mis 20 Rosas 🌹</title>
    <style>
        body { background: #000; color: white; text-align: center; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .contenedor { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-width: 300px; }
        .rosa { font-size: 40px; animation: aparecer 1.5s ease-out forwards; opacity: 0; }
        @keyframes aparecer { from { transform: scale(0) rotate(-45deg); opacity: 0; } to { transform: scale(1) rotate(0deg); opacity: 1; } }
        h1 { color: #ff4d4d; text-shadow: 0 0 10px #f00; font-size: 22px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🌹 20 Rosas por el 20 de Abril 🌹</h1>
    <div class="contenedor" id="ramo"></div>
    <script>
        const ramo = document.getElementById('ramo');
        for (let i = 1; i <= 20; i++) {
            setTimeout(() => {
                const rosa = document.createElement('div');
                rosa.className = 'rosa';
                rosa.innerHTML = '🌹';
                ramo.appendChild(rosa);
            }, i * 200); // Esto hace que aparezcan una por una
        }
    </script>
</body>
</html>
