<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tus 20 Rosas</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        canvas { width: 100vmin; height: 100vmin; }
        .texto { position: absolute; bottom: 5%; color: #ff4d4d; font-family: Arial; font-size: 22px; text-shadow: 0 0 10px #ff0000; text-align: center; }
    </style>
</head>
<body>
    <div class="texto">🌹 Feliz 20 de Abril 🌹<br>Mis 20 rosas para ti</div>
    <canvas id="c"></canvas>
    <script>
        var c = document.getElementById("c");
        var a = c.getContext("2d");
        function d(n, e) {
            for (var r = 0; r < e; r++) {
                var o = Math.random() * 2 * Math.PI,
                    t = Math.random(),
                    i = 300 + Math.sin(o) * t * 250,
                    l = 300 + Math.cos(o) * t * 250;
                a.fillStyle = n, a.fillRect(i, l, 1.5, 1.5);
            }
        }
        c.width = c.height = 600;
        var s = 0;
        function animate() {
            if (s < 50) {
                // Dibuja pétalos rojos
                d("rgba(200,0,0,0.5)", 500);
                // Dibuja centro oscuro
                d("rgba(50,0,0,0.2)", 100);
                s++;
                requestAnimationFrame(animate);
            }
        }
        animate();
    </script>
</body>
</html>
