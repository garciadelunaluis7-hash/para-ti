<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tu Ramo de 20 Rosas 🌹</title>
    <style>
        body { background-color: #050505; margin: 0; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        .titulo { color: #ff3333; font-size: 28px; font-weight: bold; text-shadow: 0 0 15px #ff0000; margin-bottom: 10px; text-align: center; z-index: 10; }
        .sub { color: #fff; font-size: 18px; margin-top: 5px; opacity: 0.8; z-index: 10; }
    </style>
</head>
<body>
    <div class="titulo">🌹 Tus 20 Rosas del 20 de Abril 🌹</div>
    <div class="sub">Creado especialmente para ti</div>
    <canvas id="c"></canvas>

    <script>
        var canvas = document.getElementById("c");
        var ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        var rosas = [];
        var numRosas = 20;

        // Configuramos las posiciones de las 20 rosas para que parezca un ramo
        for (var i = 0; i < numRosas; i++) {
            rosas.push({
                x: Math.random() * (canvas.width * 0.8) + (canvas.width * 0.1),
                y: Math.random() * (canvas.height * 0.6) + (canvas.height * 0.2),
                size: Math.random() * 20 + 10,
                color: "rgba(" + (Math.floor(Math.random() * 100) + 155) + ", 0, 0, 0.6)"
            });
        }

        var t = 0;
        function draw() {
            if (t < 50) {
                for (var j = 0; j < rosas.length; j++) {
                    var r = rosas[j];
                    for (var i = 0; i < 50; i++) {
                        var angle = Math.random() * Math.PI * 2;
                        var dist = Math.random() * r.size * t * 0.2;
                        var px = r.x + Math.cos(angle) * dist;
                        var py = r.y + Math.sin(angle) * dist;
                        
                        ctx.fillStyle = r.color;
                        ctx.fillRect(px, py, 1.5, 1.5);
                    }
                }
                t += 0.5;
                requestAnimationFrame(draw);
            }
        }

        draw();
    </script>
</body>
</html>
