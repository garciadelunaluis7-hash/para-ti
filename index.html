<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Rosas para Mich 🌹</title>
    <style>
        /* Fondo crema suave como tu imagen */
        body { background: #fdf0d5; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Arial', sans-serif; overflow: hidden; }
        
        /* Título con efecto de latido */
        h1 { color: #b22222; text-shadow: 0 0 10px rgba(255,255,255,0.8); font-size: 26px; margin-bottom: 30px; text-align: center; animation: latido 2s infinite; }

        @keyframes latido {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); text-shadow: 0 0 20px #ff4d4d; }
        }

        .bouquet-frame { position: relative; width: 300px; height: 400px; display: flex; justify-content: center; }

        /* Papel blanco estilo 3D */
        .papel { position: absolute; bottom: 0; width: 100%; height: 260px; background: #ffffff; clip-path: polygon(0 0, 100% 0, 80% 100%, 20% 100%); border-radius: 0 0 80px 80px; z-index: 10; box-shadow: 0 15px 35px rgba(0,0,0,0.1), inset 0 -10px 20px rgba(0,0,0,0.05); }
        
        /* Lazo amarillo */
        .lazo { position: absolute; bottom: 60px; width: 70px; height: 12px; background: #ffd700; border-radius: 10px; z-index: 15; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }

        /* Contenedor donde florecen las 20 rosas */
        .area-flores { position: absolute; top: -20px; width: 220px; height: 200px; z-index: 5; display: flex; flex-wrap: wrap; justify-content: center; align-content: center; }

        .rosa { font-size: 55px; margin: -18px; opacity: 0; transform: scale(0) rotate(-15deg); animation: nacer 0.8s cubic-bezier(0.17, 0.67, 0.6, 1.2) forwards; filter: drop-shadow(3px 5px 10px rgba(0,0,0,0.3)); }

        @keyframes nacer { 
            to { opacity: 1; transform: scale(1) rotate(var(--r)); } 
        }

        /* Destellos brillantes */
        .sparkle { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flash 1.5s infinite; z-index: 20; pointer-events: none; }
        @keyframes flash { 0%, 100% { transform: scale(0); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 15px #fff; } }
    </style>
</head>
<body>
    <h1>🌹 20 Rosas para Mich 🌹</h1>

    <div class="bouquet-frame">
        <div class="area-flores" id="bouquet"></div>
        <div class="papel"></div>
        <div class="lazo"></div>
    </div>

    <script>
        const bouquet = document.getElementById('bouquet');
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const rosa = document.createElement('div');
                rosa.className = 'rosa';
                // Le damos una rotación aleatoria a cada rosa para que se vea natural
                const randomRot = Math.floor(Math.random() * 40) - 20;
                rosa.style.setProperty('--r', randomRot + 'deg');
                rosa.innerHTML = '🌹';
                bouquet.appendChild(rosa);
                
                // Creamos un destello por cada rosa que nace
                createSparkle();
            }, i * 150);
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 7 + 3;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            // Los destellos aparecen cerca del ramo
            s.style.top = (Math.random() * 300) + 'px';
            s.style.left = (Math.random() * 300) + 'px';
            document.body.appendChild(s);
        }
    </script>
</body>
</html>
