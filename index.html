<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mich 💗</title>

<style>
body { margin:0; overflow:hidden; background:black; }

.texto{
  position:absolute;
  top:30px;
  width:100%;
  text-align:center;
  font-size:42px;
  color:#ff2e4d;
  text-shadow:0 0 25px #ff2e4d;
  z-index:10;
}
</style>
</head>

<body>

<div class="texto">Para Mich 💗</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 12);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* luces */
scene.add(new THREE.AmbientLight(0xffffff, 1.5));

const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(5,5,5);
scene.add(light);

/* loader */
const loader = new THREE.GLTFLoader();

const roses = [];

const positions = [
[-2,3,0],[0,3.5,0],[2,3,0],
[-3,2,0],[-1,2,0],[1,2,0],[3,2,0],
[-3.5,1,0],[-1.5,1,0],[0,1,0],[1.5,1,0],[3.5,1,0],
[-2,0,0],[0,0,0],[2,0,0],
[-1,-1,0],[1,-1,0],
[-0.5,-2,0],[0.5,-2,0],
[0,-3,0]
];

loader.load('rose.glb', function(gltf){

  positions.forEach((p,i)=>{
    const rose = gltf.scene.clone();

    rose.position.set(p[0], p[1]-8, p[2]);
    rose.scale.set(0.4,0.4,0.4);

    scene.add(rose);

    roses.push({
      mesh: rose,
      targetY: p[1],
      delay: i * 0.2
    });
  });

});

function animate(time){
  requestAnimationFrame(animate);

  roses.forEach(r=>{
    if(time > r.delay * 1000){
      r.mesh.position.y += (r.targetY - r.mesh.position.y) * 0.07;
      r.mesh.rotation.y += 0.01;
    }
  });

  camera.position.x = Math.sin(time * 0.0003) * 1.2;
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
