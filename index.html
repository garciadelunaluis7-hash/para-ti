<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 Rosas para Mich</title>
    <style>
        body { background: #fdf0d5; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        h1 { color: #d62828; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); font-size: 24px; position: absolute; top: 10%; z-index: 10; }
        
        .bouquet { position: relative; width: 300px; height: 400px; display: flex; justify-content: center; }
        
        /* Papel envolvente estilo Rosify */
        .wrapper { position: absolute; bottom: 50px; width: 220px; height: 280px; background: #fff; clip-path: polygon(0% 0%, 100% 0%, 80% 100%, 20% 100%); border-radius: 0 0 100px 100px; box-shadow: inset 0 -20px 30px rgba(0,0,0,0.05); z-index: 2; }
        .wrapper::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0) 50%, rgba(0,0,0,0.02) 100%); }
        .ribbon { position: absolute; bottom: 90px; width: 60px; height: 10px; background: #ffbe0b; border-radius: 5px; z-index: 3; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .roses-grid { position: absolute; top: 20px; width: 200px; height: 200px; z-index: 1; display: flex; flex-wrap: wrap; justify-content: center; }
        
        .rose { font-size: 45px; margin: -10px; opacity: 0; transform: translateY(20px) scale(0); animation: appear 0.6s ease-out forwards; filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.1)); }
        
        @keyframes appear { to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Destellos */
        .sparkle { position: absolute; background: white; border-radius: 50%; opacity: 0; animation: flash 1.5s infinite; z-index: 5; pointer-events: none; }
        @keyframes flash { 0%, 100% { transform: scale(0); opacity: 0; } 50% { transform: scale(1); opacity: 1; box-shadow: 0 0 10px #fff; } }
    </style>
</head>
<body>
    <h1>🌹 20 Rosas para Mich 🌹</h1>
    
    <div class="bouquet">
        <div class="roses-grid" id="garden"></div>
        <div class="wrapper"></div>
        <div class="ribbon"></div>
    </div>

    <script>
        const garden = document.getElementById('garden');
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const rose = document.createElement('div');
                rose.className = 'rose';
                rose.innerHTML = '🌹';
                garden.appendChild(rose);
                if(i % 2 === 0) createSparkle();
            }, i * 150);
        }

        function createSparkle() {
            const s = document.createElement('div');
            s.className = 'sparkle';
            const size = Math.random() * 6 + 3;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.top = Math.random() * 60 + 10 + '%';
            s.style.left = Math.random() * 80 + 10 + '%';
            s.style.animationDelay = Math.random() * 2 + 's';
            document.querySelector('.bouquet').appendChild(s);
        }
    </script>
</body>
</html>
