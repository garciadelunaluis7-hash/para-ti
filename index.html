<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para Mich 💗</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: black;
  overflow: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial;
}

/* ⭐ estrellas */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(white 1px, transparent 1px);
  background-size: 3px 3px;
  animation: estrellas 60s linear infinite;
  opacity: 0.5;
}

@keyframes estrellas {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}

/* contenedor */
.contenido {
  position: relative;
  width: 360px;
  height: 500px;
}

/* 🌿 ENVOLTURA (papel) */
.envoltura {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 220px;
  height: 180px;
  background: linear-gradient(135deg, #2ecc71, #27ae60);
  clip-path: polygon(0% 0%, 100% 0%, 70% 100%, 30% 100%);
  z-index: 1;
  box-shadow: 0 10px 30px rgba(0,0,0,0.6);
}

/* rosas */
.rosa {
  position: absolute;
  width: 50px;
  opacity: 0;
  transform: translateY(250px) scale(0.5);
  animation: subir 0.8s forwards;
  filter: drop-shadow(0 5px 10px rgba(0,0,0,0.6));
}

/* animación subir */
@keyframes subir {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

/* 🌹 POSICIONES RAMO */
.r1 { top: 20px; left: 130px; animation-delay: 0.2s; }
.r2 { top: 30px; left: 90px; animation-delay: 0.4s; }
.r3 { top: 30px; left: 170px; animation-delay: 0.6s; }
.r4 { top: 60px; left: 50px; animation-delay: 0.8s; }
.r5 { top: 60px; left: 210px; animation-delay: 1s; }

.r6 { top: 100px; left: 30px; animation-delay: 1.2s; }
.r7 { top: 100px; left: 90px; animation-delay: 1.4s; }
.r8 { top: 100px; left: 150px; animation-delay: 1.6s; }
.r9 { top: 100px; left: 210px; animation-delay: 1.8s; }
.r10 { top: 100px; left: 270px; animation-delay: 2s; }

.r11 { top: 150px; left: 60px; animation-delay: 2.2s; }
.r12 { top: 150px; left: 120px; animation-delay: 2.4s; }
.r13 { top: 150px; left: 180px; animation-delay: 2.6s; }
.r14 { top: 150px; left: 240px; animation-delay: 2.8s; }

.r15 { top: 200px; left: 100px; animation-delay: 3s; }
.r16 { top: 200px; left: 160px; animation-delay: 3.2s; }
.r17 { top: 200px; left: 220px; animation-delay: 3.4s; }

.r18 { top: 250px; left: 130px; animation-delay: 3.6s; }
.r19 { top: 250px; left: 170px; animation-delay: 3.8s; }

.r20 { top: 300px; left: 150px; animation-delay: 4s; }

/* texto */
.texto {
  position: absolute;
  bottom: -70px;
  width: 100%;
  text-align: center;
  font-size: 28px;
  color: #ff4d6d;
  font-weight: bold;
  opacity: 0;
  animation: textoAparece 1s forwards;
  animation-delay: 4.8s;
  text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
}

@keyframes textoAparece {
  to { opacity: 1; }
}
</style>
</head>

<body>

<div class="contenido">

  <!-- 🌿 ENVOLTURA -->
  <div class="envoltura"></div>

  <!-- 🌹 ROSAS -->
  <img class="rosa r1" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r2" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r3" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r4" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r5" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">

  <img class="rosa r6" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r7" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r8" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r9" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r10" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">

  <img class="rosa r11" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r12" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r13" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r14" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">

  <img class="rosa r15" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r16" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r17" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">

  <img class="rosa r18" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">
  <img class="rosa r19" src="https://cdn-icons-png.flaticon.com/512/3239/3239955.png">

  <!-- 💗 TEXTO -->

    Eres tan bonita 🫶❤️
  </div>

</body>
</html>
